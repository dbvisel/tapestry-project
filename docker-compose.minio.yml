services:
  client:
    build:
      dockerfile: ./Dockerfile.client-minio
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_AUTH_PROVIDER: ${AUTH_PROVIDER}
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        VITE_BUG_REPORT_ FORM_URL: ${BUG_REPORT_FORM_URL}
        VITE_AI_CHAT_EXPIRES_IN: ${AI_CHAT_EXPIRES_IN}
        VITE_WEBPAGE_LOADER_TIMEOUT: ${WEBPAGE_LOADER_TIMEOUT}
        VITE_STUN_SERVER: ${STUN_SERVER}
        VITE_SENTRY_DSN: ${SENTRY_DSN_CLIENT}
    ports:
      - 8080:80
    # networks:
    #   - traefik
    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.${ENVIRONMENT_NAME}.rule=Host(`${HOST}.asteasolutions.net`)
    #   - traefik.http.services.${ENVIRONMENT_NAME}.loadbalancer.server.port=80
    #   - traefik.http.routers.${ENVIRONMENT_NAME}.entrypoints=https
    #   - traefik.http.routers.${ENVIRONMENT_NAME}.tls=true

  server:
    build:
      dockerfile: ./Dockerfile.server
      target: server
    environment: &server_env
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_USE_SSL: ${DB_USE_SSL}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}?schema=public
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      SECRET_KEY: ${SECRET_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      AWS_S3_FORCE_PATH_STYLE: ${AWS_S3_FORCE_PATH_STYLE}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      EXTERNAL_SERVER_URL: ${EXTERNAL_SERVER_URL}
      VIEWER_URL: ${VIEWER_URL}
      JOBS_ADMIN_NAME: ${JOBS_ADMIN_NAME}
      JOBS_ADMIN_PASSWORD: ${JOBS_ADMIN_PASSWORD}
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_ROLE_ID: ${VAULT_ROLE_ID}
      VAULT_SECRET_ID: ${VAULT_SECRET_ID}
      SENTRY_DSN: ${SENTRY_DSN_SERVER}
      IA_ACCOUNT_ID: ${IA_ACCOUNT_ID}
      IA_SECRET: ${IA_SECRET}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL}
      TAPESTRY_THUMBNAIL_GENERATION_DELAY: 120_000
      TAPESTRY_THUMBNAIL_GENERATION_TIMEOUT: 600_000
      S3_CLEAN_UP_CRON_PATTERN: ${S3_CLEAN_UP_CRON_PATTERN}
    ports:
      - 3201:3000
    # networks:
    #   - traefik
    #   - database
    #   - redis
    #   - vault
    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.${ENVIRONMENT_NAME}-api.rule=Host(`${HOST}-api.asteasolutions.net`)
    #   - traefik.http.services.${ENVIRONMENT_NAME}-api.loadbalancer.server.port=3000
    #   - traefik.http.routers.${ENVIRONMENT_NAME}-api.entrypoints=https
    #   - traefik.http.routers.${ENVIRONMENT_NAME}-api.tls=true

    depends_on:
      - db
      - redis
      - vault

  worker:
    build:
      dockerfile: ./Dockerfile.server
      target: worker
    init: true
    environment:
      <<: *server_env
      PUPPETEER_ARGS: "--no-sandbox,--disable-gpu,--disable-dev-shm-usage"
    depends_on:
      - db
      - redis
    # networks:
    #   - database
    #   - redis

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # networks:
    #   - database
    ports:
      - "${DB_PORT:-5432}:5432"

  redis:
    image: redis:7
    volumes:
      - ./deployment/redis/redis.conf:/usr/local/etc/redis/redis.conf
    # networks:
    #   - redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  vault:
    image: hashicorp/vault
    container_name: vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      ROLE_ID: ${VAULT_ROLE_ID}
      SECRET_ID: ${VAULT_SECRET_ID}
    volumes:
      - ./deployment/vault:/scripts
    cap_add:
      - IPC_LOCK
    command: ["/scripts/start-dev.sh"]

  mc: # MinIO Client
    image: minio/mc:latest
    entrypoint: ["sleep", "infinity"]
    depends_on:
      - minio
  
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
      MINIO_DEFAULT_BUCKETS: ${AWS_S3_BUCKET_NAME}
      CONSOLE_ACCESS_KEY: ${MINIO_CONSOLE_ACCESS_KEY}
      CONSOLE_SECRET_KEY: ${MINIO_CONSOLE_SECRET_KEY}
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
      MINIO_API_CORS_ALLOW_CREDENTIALS_WITH_WILDCARD: "on"
    # networks:
    #   - minio
    command: server --address ":9000" --console-address ":9001" /data
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    # command: server /data

# networks:
#   database:
#   redis:
#   traefik:
#     external: true
#   vault:
#   minio:

volumes:
  pgdata:
  vault-data:
  minio-data:
